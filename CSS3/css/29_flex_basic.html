<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-basic</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        .parent {
            /*padding: 0;
            padding-top: 3%;*/
            height: 100px;
            border: 1px solid red;
            display: flex;
            flex-direction: row; /*순차정렬*/
            flex-wrap: wrap; /**/
            justify-content: space-between;/*양쪽을 기준으로 정렬*/
            align-items: center
        }
        .parent div {
            background-color: bisque;
            border: 1px solid salmon;
            padding: 10px 30px;
        }
    </style>
</head>
<body>
    <h1>Flex-basic</h1>
    <div class="parent">
        <div>Flex item 1</div>
        <div>Flex item</div>
        <div>Flex item</div>
        <div>Flex item</div>
        <div>Flex item</div>
    </div>
</body>
</html>
